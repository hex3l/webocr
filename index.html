<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebOCR — Private OCR in Your Browser | Powered by Tesseract.js</title>
    <meta
      name="description"
      content="WebOCR is private OCR in your browser — images never leave your device. Upload or paste an image, extract text in 80+ languages, and review past sessions. Powered by Tesseract.js."
    />
    <link rel="canonical" href="https://hex3l.github.io/webocr/" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <meta name="theme-color" content="#faf8f5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1f1b18" media="(prefers-color-scheme: dark)" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hex3l.github.io/webocr/" />
    <meta property="og:site_name" content="WebOCR" />
    <meta property="og:title" content="WebOCR — Private OCR in Your Browser, Powered by Tesseract.js" />
    <meta
      property="og:description"
      content="Private OCR in your browser — images never leave your device. Upload or paste an image, extract text in 80+ languages, and review past sessions."
    />
    <meta property="og:image" content="https://hex3l.github.io/webocr/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WebOCR — Private OCR in Your Browser, Powered by Tesseract.js" />
    <meta
      name="twitter:description"
      content="Private OCR in your browser — images never leave your device. Upload or paste an image, extract text in 80+ languages."
    />
    <meta name="twitter:image" content="https://hex3l.github.io/webocr/og-image.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "WebOCR",
        "url": "https://hex3l.github.io/webocr/",
        "description": "Private OCR in your browser — images never leave your device. Upload or paste an image, extract text in 80+ languages, and review past sessions. Powered by Tesseract.js.",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any (web browser)",
        "browserRequirements": "Requires JavaScript and WebAssembly",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "creator": {
          "@type": "Person",
          "name": "hex3l",
          "url": "https://github.com/hex3l"
        }
      }
    </script>

    <link rel="stylesheet" href="css/styles.css?v=1783900544" />
    <script>
      (function () {
        var t = localStorage.getItem("webocr-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      })();
    </script>
  </head>
  <body>
    <div id="updateBanner" class="update-banner hidden" role="status" aria-live="polite">
      <span class="update-text">A new version of WebOCR is available.</span>
      <button type="button" id="reloadBtn" class="update-btn">Reload</button>
      <button type="button" id="dismissBtn" class="update-close" aria-label="Dismiss">×</button>
    </div>
    <header class="site-header">
      <div class="container header-inner">
        <h1 class="brand">
          <span class="brand-mark">WebOCR</span>
        </h1>
        <p class="tagline">Private OCR in your browser · powered by Tesseract.js</p>
      <div class="header-actions">
        <a
          id="starBtn"
          class="star-btn"
          href="https://github.com/hex3l/webocr"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Star webocr on GitHub"
        >
          <svg class="star-icon" viewBox="0 0 16 16" aria-hidden="true">
            <path fill="currentColor" d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25z"/>
          </svg>
          <span class="star-label">Star</span>
          <span id="starCount" class="star-count">—</span>
        </a>
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Switch theme">
          <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0-5a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1zm0 16a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0v-2a1 1 0 0 1 1-1zM4.2 4.2a1 1 0 0 1 1.4 0l1.5 1.5A1 1 0 1 1 5.7 7.1L4.2 5.6a1 1 0 0 1 0-1.4zm12.7 12.7a1 1 0 0 1 1.4 0l1.5 1.5a1 1 0 0 1-1.4 1.4l-1.5-1.5a1 1 0 0 1 0-1.4zM2 12a1 1 0 0 1 1-1h2a1 1 0 1 1 0 2H3a1 1 0 0 1-1-1zm16 0a1 1 0 0 1 1-1h2a1 1 0 1 1 0 2h-2a1 1 0 0 1-1-1zM4.2 19.8a1 1 0 0 1 0-1.4l1.5-1.5a1 1 0 1 1 1.4 1.4l-1.5 1.5a1 1 0 0 1-1.4 0zM16.9 7.1a1 1 0 0 1 0-1.4l1.5-1.5a1 1 0 1 1 1.4 1.4l-1.5 1.5a1 1 0 0 1-1.4 0z"/>
          </svg>
          <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
          </svg>
        </button>
      </div>
      </div>
    </header>

    <main class="container layout">
      <section class="panel workspace" aria-label="OCR workspace">
        <div id="dropZone" class="drop-zone" role="button" tabindex="0" aria-label="Drop an image or click to browse">
          <svg class="drop-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M19 13v6H5v-6H3v6a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-6h-2zM7 9l5 5 5-5h-3V3H10v6H7z"
              fill="currentColor"
            />
          </svg>
          <p class="drop-title">Drop an image here</p>
          <p class="drop-hint">or click to browse · or paste from clipboard · PNG, JPG, WEBP, BMP</p>
          <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp,image/bmp" hidden />
        </div>

        <div id="previewWrap" class="preview-wrap hidden">
          <img id="preview" alt="Selected image preview" />
          <button id="changeImage" type="button" class="link-btn">Change image</button>
        </div>

        <div class="controls">
          <label class="field">
            <span class="field-label">Language</span>
            <select id="langSelect"></select>
          </label>
          <div class="actions">
            <button id="runBtn" type="button" class="btn btn-primary" disabled>Extract text</button>
            <button id="copyBtn" type="button" class="btn" disabled>Copy text</button>
          </div>
        </div>

        <div id="progress" class="progress hidden" aria-live="polite">
          <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
          <p id="progressText" class="progress-text">Starting…</p>
        </div>

        <div id="resultWrap" class="result-wrap hidden">
          <label class="field-label" for="resultText">Extracted text</label>
          <textarea id="resultText" rows="10" spellcheck="false" placeholder="Recognized text will appear here. You can edit it before saving."></textarea>
        </div>
      </section>

      <aside class="panel history" aria-label="Session history">
        <div class="history-head">
          <h2>History</h2>
          <button id="clearHistory" type="button" class="link-btn danger" disabled>Clear all</button>
        </div>
        <ul id="historyList" class="history-list">
          <li class="history-empty">No sessions yet — your OCR history will appear here.</li>
        </ul>
      </aside>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p class="copyright">© <span id="year"></span> hex3l · <a href="https://github.com/hex3l/webocr" target="_blank" rel="noopener noreferrer">GitHub</a></p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" defer></script>
    <script src="js/languages.js?v=1783900544" defer></script>
    <script src="js/db.js?v=1783900544" defer></script>
    <script src="js/ocr.js?v=1783900544" defer></script>
    <script src="js/app.js?v=1783900544" defer></script>
  </body>
</html>
